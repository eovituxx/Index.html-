<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vijo Shop - Verificação de Segurança</title>

    <link rel="icon" type="image/jpeg" href="m11.jpeg">

    <style>
        /* CONFIGURAÇÃO DE CORES */
        :root {
            --verde-vijo: #39A935;
            --azul-vijo: #1A65B1;
            --amarelo-meli: #FFF159;
            --texto-escuro: #2C3E50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #39A935, #FFF159, #2b8228, #e5d64b);
            background-size: 400% 400%;
            animation: ondasDeCor 12s ease infinite;
            color: var(--texto-escuro);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes ondasDeCor {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            max-width: 450px;
            width: 100%;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,.15);
        }

        .container::before {
            content: '';
            position: absolute;
            inset: -4px;
            background: linear-gradient(45deg, var(--verde-vijo), var(--azul-vijo), var(--amarelo-meli), var(--verde-vijo));
            background-size: 400% 400%;
            border-radius: 24px;
            z-index: -1;
            animation: gradientBorder 8s ease infinite;
        }

        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logo-box {
            margin-bottom: 25px;
        }

        .logo-box img {
            width: 180px;
            max-width: 40%;
            height: auto;
        }

        h1 {
            color: var(--azul-vijo);
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: .95rem;
            margin-bottom: 25px;
        }

        .success-box {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .checkmark-circle {
            width: 60px;
            height: 60px;
            border: 4px solid var(--verde-vijo);
            border-radius: 50%;
            position: relative;
            background: #fff;
        }

        .checkmark.draw:after {
            animation: checkmark 1s ease;
            transform: scaleX(-1) rotate(135deg);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            left: 7px;
            top: 29px;
            width: 15px;
            height: 30px;
            border-right: 4px solid var(--verde-vijo);
            border-top: 4px solid var(--verde-vijo);
            transform-origin: left top;
        }

        @keyframes checkmark {
            0% {height:0;width:0;}
            20% {height:0;width:15px;}
            40%,100% {height:30px;width:15px;}
        }

        .product-box {
            margin-bottom: 25px;
        }

        .product-img {
            max-width: 50%;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,.15));
            transition: transform .3s;
        }

        .product-img:hover {
            transform: scale(1.03);
        }

        .btn-Meli {
            display: inline-block;
            width: 100%;
            padding: 16px 20px;
            background: var(--amarelo-meli);
            color: #333;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.05rem;
            border-radius: 10px;
            transition: .2s;
            box-shadow: 0 4px 15px rgba(0,0,0,.1);
        }

        .btn-Meli:hover {
            background: #e6d950;
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 25px;
            font-size: .75rem;
            color: #aaa;
        }

        @media (max-width:768px){
            .container{
                width:95%;
                padding:30px 20px;
            }

            .logo-box img{
                width:150px;
            }

            h1{
                font-size:1.25rem;
            }

            p{
                font-size:.9rem;
            }

            .product-img{
                max-width:90%;
            }
        }

        @media (max-width:400px){
            body{
                padding:10px;
            }

            .container{
                padding:25px 15px;
            }

            h1{
                font-size:1.15rem;
            }

            p{
                font-size:.85rem;
                margin-bottom:20px;
            }

            .btn-Meli{
                padding:14px 15px;
                font-size:.9rem;
            }

            .checkmark-circle{
                width:50px;
                height:50px;
            }

            .checkmark:after{
                width:12px;
                height:25px;
                left:10px;
                top:22px;
            }
        }
    </style>

</head>

</div>
